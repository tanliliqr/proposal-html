<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>恋爱时间轴-第一次做的事情</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
<!-- ==================== 2. 恋爱时间轴 ==================== -->
<div id="timeline-screen" class="screen">
    <div class="timeline-container" id="timeline-box">
        <div class="timeline-title">💌 我们的故事</div>
        <div id="timeline-items"></div>
    </div>
</div>
<script>
    const CONFIG = GLOBAL_CONFIG;
    // 全局记录时间轴状态，方便清理
    let timelineScrollReq;
    let timelineDone = false;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.add('hidden');
            s.classList.remove('active');
        });
        const target = document.getElementById(id);
        target.classList.remove('hidden');
        setTimeout(() => target.classList.add('active'), 50);
    }

    function showTimeline() {
        showScreen('timeline-screen');
        const box = document.getElementById('timeline-items');
        const container = document.getElementById('timeline-box');
        box.innerHTML = '';

        // 重置状态
        timelineDone = false;
        container.scrollTop = 0;
        cancelAnimationFrame(timelineScrollReq);

        // 1. 生成 DOM 并错开时间展示
        CONFIG.timeline.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'timeline-item';
            div.innerHTML = `
        <div class="timeline-dot"></div>
        <div class="timeline-content">
            <div class="timeline-date">${item.date}</div>
            <div class="timeline-text">${item.text}</div>
        </div>
        ${item.img ? `<img class="timeline-img" src="${item.img}" alt="" onerror="this.style.display='none'">` : ''}
        `;
            box.appendChild(div);

            // 依次展示动画
            setTimeout(() => div.classList.add('show'), i * 600);
        });

        const totalAnimTime = CONFIG.timeline.length * 2000; // 所有元素展示完所需的总时间

        // 2. 实现电影幕布般的平滑自动向下滚动
        let currentScroll = 0;
        const scrollSpeed = 1; // 每次滚动的像素，越小越慢越温柔 (推荐 0.4 ~ 0.8)

        function autoScroll() {
            if (timelineDone) return;

            currentScroll += scrollSpeed;
            container.scrollTop = currentScroll;

            // 检测是否已经滚到底部 (预留 2px 误差)
            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                finishTimeline();
            } else {
                // 没有到底，继续下一帧滚动
                timelineScrollReq = requestAnimationFrame(autoScroll);
            }
        }

        function finishTimeline() {
            if (timelineDone) return;
            timelineDone = true;
            cancelAnimationFrame(timelineScrollReq);

            // 到底部后，稍微停留两秒再进入下一个环节，体验更佳
            setTimeout(() => {
                showStory(0);
            }, 2000);
        }

        // 3. 延迟两秒后，开始自动滚动（给第一条内容展示留出时间）
        setTimeout(() => {
            // 如果内容高度确实超过了容器，才需要滚动
            if (container.scrollHeight > container.clientHeight) {
                autoScroll();
            } else {
                // 如果内容很少没出现滚动条，等动画全部播完后直接进入下一页
                setTimeout(finishTimeline, totalAnimTime + 2000);
            }
        }, 1500);

        // 4. 极致安全兜底机制
        // 万一出现任何意外卡住，最迟在一定时间后强制进入故事模式
        const fallbackTime = Math.max(120000, totalAnimTime + 8000);
        setTimeout(() => {
            finishTimeline();
        }, fallbackTime);
    }

    showTimeline();
</script>
</body>
</html>
